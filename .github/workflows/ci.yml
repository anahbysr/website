name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./anah.db
      ADMIN_PASSWORD: ci-admin-password
      ADMIN_SESSION_SECRET: ci-admin-session-secret-32chars
      EMAIL_FROM: ci@example.com
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: ci-user
      SMTP_PASS: ci-pass
      RAZORPAY_KEY_ID: mock_key
      RAZORPAY_KEY_SECRET: mock_secret
      NEXT_PUBLIC_RAZORPAY_KEY_ID: mock_key
      RAZORPAY_WEBHOOK_SECRET: mock_webhook
      INSTAGRAM_ACCESS_TOKEN: mock_ig_token
      INSTAGRAM_USER_ID: mock_ig_user
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Build app
        run: npm run build
